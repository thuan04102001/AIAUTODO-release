<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI AUTODO Meta OAuth</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: #0b1020;
      color: #f8fafc;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 92, 255, 0.22), transparent 34%),
        radial-gradient(circle at 80% 10%, rgba(34, 211, 238, 0.12), transparent 28%),
        #0b1020;
    }
    main {
      width: min(560px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }
    .dot {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      margin-bottom: 16px;
      background: #7c5cff;
      color: #fff;
      font-weight: 900;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.6;
    }
    a {
      color: #a5b4fc;
      font-weight: 800;
    }
    code {
      display: block;
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(2, 6, 23, 0.7);
      color: #a5f3fc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <main>
    <div class="dot">↘</div>
    <h1>Đang chuyển về AI AUTODO</h1>
    <p>Facebook đã trả kết quả OAuth. Trang này chỉ chuyển tiếp mã xác thực về app đang chạy trên máy của bạn, không lưu token.</p>
    <p>Nếu trình duyệt không tự chuyển, bấm liên kết bên dưới.</p>
    <a id="fallback" href="#">Mở AI AUTODO callback</a>
    <code id="target"></code>
  </main>
  <script>
    (function () {
      var localCallback = "http://127.0.0.1:18080/auto-reup/meta/oauth/callback";
      var target = localCallback + window.location.search + window.location.hash;
      var link = document.getElementById("fallback");
      var code = document.getElementById("target");
      link.href = target;
      code.textContent = target;
      window.setTimeout(function () {
        window.location.replace(target);
      }, 350);
    })();
  </script>
</body>
</html>
